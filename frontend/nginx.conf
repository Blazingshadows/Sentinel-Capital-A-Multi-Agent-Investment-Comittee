server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: any unknown path falls back to index.html rather than
    # a static 404, since there's no server-side routing to match against.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Regenerated per-container-start (see docker-entrypoint.sh) -- must
    # never be cached, or a redeploy with a new API_BASE_URL would leave
    # already-loaded browser tabs pointed at the old backend.
    location = /env-config.js {
        add_header Cache-Control "no-store";
    }

    # Vite's asset filenames are content-hashed, so these are safe to cache
    # aggressively -- a new build always gets new filenames.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json;
}
